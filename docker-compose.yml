services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: ci4-app

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www/html

    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: ci4-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd123"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

    restart: unless-stopped

volumes:
  sqlserver_data:
